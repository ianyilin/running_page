name: Run Data Sync

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/run_data_sync.yml
      - public/**
      - src/**
      - index.html
      - package.json
      - pnpm-lock.yaml
      - vite.config.ts
      - run_page/config.py
      - run_page/generator/**
      - run_page/coach/**
      - run_page/strava_sync.py
      - run_page/strava_env_sync.py
      - run_page/apple_workout_import.py
      - run_page/polyline_processor.py
      - scripts/**
      - requirements.txt

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Publish Running Page
    runs-on: ubuntu-latest

    steps:
      - name: Checkout running page repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Sync Strava runs
        if: github.event_name != 'push'
        run: |
          python run_page/strava_sync.py \
            "${{ secrets.STRAVA_CLIENT_ID }}" \
            "${{ secrets.STRAVA_CLIENT_SECRET }}" \
            "${{ secrets.STRAVA_CLIENT_REFRESH_TOKEN }}" \
            --only-run

      - name: Generate and email daily coach plan
        if: github.event_name != 'push'
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          COACH_EMAIL_TO: ${{ secrets.COACH_EMAIL_TO }}
          COACH_EMAIL_FROM: ${{ secrets.COACH_EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python run_page/coach/daily_coach.py --send-email

      - name: Commit synced data
        if: github.event_name != 'push'
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add run_page/data.db src/static/activities.json
          test ! -d run_page/coach_output || git add run_page/coach_output
          git commit -m 'update new runs' || echo 'nothing to commit'
          git push || echo 'nothing to push'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable pnpm
        run: npm install -g corepack@latest && corepack enable pnpm

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build running page for /running/
        run: PATH_PREFIX=/running/ pnpm build

      - name: Validate homepage deploy token
        env:
          HOMEPAGE_DEPLOY_TOKEN: ${{ secrets.HOMEPAGE_DEPLOY_TOKEN }}
        run: test -n "$HOMEPAGE_DEPLOY_TOKEN"

      - name: Checkout homepage repository
        uses: actions/checkout@v4
        with:
          repository: ianyilin/ianyilin.github.io
          ref: main
          token: ${{ secrets.HOMEPAGE_DEPLOY_TOKEN }}
          path: homepage
          persist-credentials: true

      - name: Publish running page into homepage repository
        run: |
          set -euxo pipefail
          rm -rf homepage/running
          mkdir -p homepage/running
          cp -R dist/. homepage/running/
          node scripts/create-static-routes.mjs homepage/running dist/index.html
          git -C homepage config user.email 'action@github.com'
          git -C homepage config user.name 'GitHub Action'
          git -C homepage add -A running
          if git -C homepage diff --cached --quiet; then
            echo 'No running page changes to publish.'
            exit 0
          fi
          git -C homepage commit -m 'update running page'
          git -C homepage push origin HEAD:main
