name: Run Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '10 3 * * *'
  push:
    branches:
      - master
    paths:
      - .github/workflows/run_data_sync.yml
      - public/**
      - src/**
      - index.html
      - package.json
      - pnpm-lock.yaml
      - vite.config.ts
      - run_page/config.py
      - run_page/generator/**
      - run_page/coach/**
      - run_page/strava_sync.py
      - run_page/strava_env_sync.py
      - run_page/apple_workout_import.py
      - run_page/intervals_icu_sync.py
      - run_page/polyline_processor.py
      - scripts/**
      - requirements.txt

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Sync Intervals.icu and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout running page repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Sync Intervals.icu runs
        if: github.event_name != 'push'
        run: |
          python run_page/intervals_icu_sync.py \
            "${{ secrets.INTERVALS_ICU_ATHLETE_ID }}" \
            "${{ secrets.INTERVALS_ICU_API_KEY }}"

      - name: Commit synced data
        if: github.event_name != 'push'
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add src/static/activities.json
          if git diff --cached --quiet; then
            echo 'No new GPX runs to commit.'
            exit 0
          fi
          git commit -m 'sync intervals runs [skip ci]'
          git push

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable pnpm
        run: npm install -g corepack@latest && corepack enable pnpm

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build running page for /running/
        run: PATH_PREFIX=/running/ pnpm build

      - name: Validate homepage deploy token
        env:
          HOMEPAGE_DEPLOY_TOKEN: ${{ secrets.HOMEPAGE_DEPLOY_TOKEN }}
        run: test -n "$HOMEPAGE_DEPLOY_TOKEN"

      - name: Checkout homepage repository
        uses: actions/checkout@v4
        with:
          repository: ianyilin/ianyilin.github.io
          ref: main
          token: ${{ secrets.HOMEPAGE_DEPLOY_TOKEN }}
          path: homepage
          persist-credentials: true

      - name: Publish running page into homepage repository
        run: |
          set -euxo pipefail
          rm -rf homepage/running
          mkdir -p homepage/running
          cp -R dist/. homepage/running/
          node scripts/create-static-routes.mjs homepage/running dist/index.html
          git -C homepage config user.email 'action@github.com'
          git -C homepage config user.name 'GitHub Action'
          git -C homepage add -A running
          if git -C homepage diff --cached --quiet; then
            echo 'No running page changes to publish.'
            exit 0
          fi
          git -C homepage commit -m 'update running page'
          git -C homepage push origin HEAD:main
